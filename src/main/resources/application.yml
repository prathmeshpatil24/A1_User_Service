server:
  port: 9091

spring:
  application:
     name: A1-USERSERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/microservices_db
    username: root
    password: system@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
   database-platform: org.hibernate.dialect.MySQLDialect
   hibernate:
      ddl-auto: update
   show-sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:9000/eureka/
  instance:
#    hostname: localhost // can cause issues in some environments, so it's often better to use prefer-ip-address
    prefer-ip-address: true

   



      
      