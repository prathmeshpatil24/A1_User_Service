server:
  port: 9091

spring:
  application:
     name: A1-USERSERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/microservices_db
    username: root
    password: system@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
   database-platform: org.hibernate.dialect.MySQLDialect
   hibernate:
      ddl-auto: update
   show-sql: true
  config:
    import: optional:configserver:http://localhost:9095  # from config server all configurations will be imported,
    #and if config server is not available,
    #it will not throw an error because of optional


